<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>逃げるボールゲーム</title>
<style>
  body {
    margin: 0;
    overflow: hidden;
    background: #111;
    color: white;
    font-family: sans-serif;
    text-align: center;
  }

  #score {
    position: fixed;
    top: 10px;
    left: 10px;
    font-size: 20px;
  }

  #ball {
    width: 50px;
    height: 50px;
    background: red;
    border-radius: 50%;
    position: absolute;
    cursor: pointer;
    transition: all 0.2s ease;
  }

  #gameOver {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 40px;
    display: none;
  }
</style>
</head>
<body>

<div id="score">スコア: 0</div>
<div id="gameOver">ゲームオーバー😂<br>クリックで再スタート</div>
<div id="ball"></div>

<script>
  const ball = document.getElementById("ball");
  const scoreText = document.getElementById("score");
  const gameOverText = document.getElementById("gameOver");

  let score = 0;
  let timeLimit = 1000;
  let timeout;
  let gameRunning = true;

  function moveBall() {
    const x = Math.random() * (window.innerWidth - 50);
    const y = Math.random() * (window.innerHeight - 50);
    ball.style.left = x + "px";
    ball.style.top = y + "px";

    clearTimeout(timeout);
    timeout = setTimeout(endGame, timeLimit);
  }

  ball.addEventListener("click", () => {
    if (!gameRunning) return;

    score++;
    scoreText.textContent = "スコア: " + score;

    // だんだん難しくなる
    timeLimit *= 0.9;

    moveBall();
  });

  function endGame() {
    gameRunning = false;
    gameOverText.style.display = "block";
  }

  document.body.addEventListener("click", () => {
    if (gameRunning) return;

    // リスタート
    score = 0;
    timeLimit = 1000;
    gameRunning = true;
    scoreText.textContent = "スコア: 0";
    gameOverText.style.display = "none";
    moveBall();
  });

  // 初期位置
  moveBall();
</script>

</body>
</html>
