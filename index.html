<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>3D Maze Horror - FPS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="ui">
        <div id="status">逃げろ！捕まるな。</div>

                </div>
                <div id="maze"></div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
