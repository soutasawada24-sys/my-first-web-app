<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <style>
        body {
            margin: 0;
            background-color: #87CEEB; /* 空の色 */
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            perspective: 800px; /* 3Dの奥行き感 */
        }

        /* 地面全体のコンテナ */
        .world {
            position: relative;
            width: 2000px;
            height: 2000px;
            background-color: #228B22; /* 芝生 */
            transform: rotateX(80deg); /* 傾けて地面にする */
            transform-style: preserve-3d;
        }

        /* 道路 */
        .road {
            position: absolute;
            left: 50%;
            top: 0;
            width: 400px;
            height: 100%;
            background-color: #333;
            transform: translateX(-50%);
            overflow: hidden;
        }

        /* 道路の中央線（アニメーションで動かす） */
        .road::after {
            content: "";
            position: absolute;
            left: 50%;
            top: -100px;
            width: 10px;
            height: 200%;
            border-left: 10px dashed white;
            transform: translateX(-50%);
            animation: moveRoad 1s linear infinite;
        }

        @keyframes moveRoad {
            from { transform: translateX(-50%) translateY(0); }
            to { transform: translateX(-50%) translateY(100px); }
        }

        /* プレイヤーの車 */
        .car {
            position: absolute;
            bottom: 100px;
            left: 50%;
            width: 80px;
            height: 120px;
            background-color: #ff0000;
            transform: translateX(-50%) rotateX(-80deg); /* 地面に対して垂直に立たせる */
            transform-origin: bottom;
            border-radius: 10px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            z-index: 10;
        }

        /* ライト */
        .car::before, .car::after {
            content: "";
            position: absolute;
            top: 5px;
            width: 15px;
            height: 10px;
            background-color: #ffff00;
        }
        .car::before { left: 10px; }
        .car::after { right: 10px; }
    </style>
</head>
<body>

    <div class="world">
        <div class="road"></div>
    </div>

    <!-- 車は地面の外に配置してカメラの前に固定 -->
    <div class="car"></div>

</body>
</html>
