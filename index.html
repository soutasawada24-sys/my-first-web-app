<!DOCTYPE html>
<html>
  <head>
    <title>HTML 3D Racing</title>
    <!-- A-Frameライブラリを読み込み（これ自体はJSですが、記述はHTMLベースになります） -->
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  </head>
  <body>
    <a-scene>
      <!-- 空 -->
      <a-sky color="#87CEEB"></a-sky>

      <!-- 地面（サーキットの床） -->
      <a-plane position="0 0 0" rotation="-90 0 0" width="100" height="100" color="#333"></a-plane>

      <!-- 車（簡易的に箱と円柱で表現） -->
      <a-entity id="car" position="0 0.5 -5">
        <!-- ボディ -->
        <a-box width="2" height="1" depth="4" color="red"></a-box>
        <!-- タイヤ -->
        <a-cylinder position="-1.1 -0.2 1.5" rotation="0 0 90" radius="0.4" height="0.2" color="black"></a-cylinder>
        <a-cylinder position="1.1 -0.2 1.5" rotation="0 0 90" radius="0.4" height="0.2" color="black"></a-cylinder>
        <a-cylinder position="-1.1 -0.2 -1.5" rotation="0 0 90" radius="0.4" height="0.2" color="black"></a-cylinder>
        <a-cylinder position="1.1 -0.2 -1.5" rotation="0 0 90" radius="0.4" height="0.2" color="black"></a-cylinder>
      </a-entity>

      <!-- 障害物 -->
      <a-box position="-5 1 -15" color="yellow"></a-box>
      <a-box position="5 1 -25" color="yellow"></a-box>

      <!-- カメラ（プレイヤーの視点） -->
      <a-entity camera look-controls wasd-controls position="0 2 0"></a-entity>
    </a-scene>
  </body>
</html>
